<!DOCTYPE html>
<html lang="it" class="auth-pending">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recensioni · Reservo</title>
<link rel="icon" href="assets/img/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
<style>html.auth-pending body { visibility: hidden; }</style>
<script type="module">
  import { requireAuth } from './assets/js/auth.js';
  requireAuth();
</script>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <main class="content">

      <div class="grid grid-3 mb-3">
        <div class="card stat-card">
          <div class="stat-icon" data-icon="star"></div>
          <div class="stat-label">Valutazione media</div>
          <div class="stat-value" id="statAvg">—</div>
        </div>
        <div class="card stat-card">
          <div class="stat-icon" data-icon="star"></div>
          <div class="stat-label">Recensioni approvate</div>
          <div class="stat-value" id="statApproved">0</div>
        </div>
        <div class="card stat-card">
          <div class="stat-icon" data-icon="star"></div>
          <div class="stat-label">In attesa di moderazione</div>
          <div class="stat-value" id="statPending">0</div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <h2>Recensioni</h2>
          <select id="filterStatus">
            <option value="">Tutte</option>
            <option value="pending">In attesa</option>
            <option value="approved">Approvate</option>
            <option value="rejected">Rifiutate</option>
          </select>
        </div>
        <div id="reviewsList"></div>
      </div>

    </main>
  </div>
</div>

<script src="assets/js/db.js"></script>
<script src="assets/js/layout.js"></script>
<script type="module" src="assets/js/recensioni.js"></script>
<script type="module" src="assets/js/feedback-widget.js"></script>
</body>
</html>
