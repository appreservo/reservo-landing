<!DOCTYPE html>
<html lang="it" class="auth-pending">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tavoli · Reservo</title>
<link rel="icon" href="assets/img/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
<style>html.auth-pending body { visibility: hidden; }</style>
<script type="module">
  import { requireAuth } from './assets/js/auth.js';
  requireAuth();
</script>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <main class="content">

      <div class="card mb-3">
        <div class="card-header">
          <h2>Vista tavoli</h2>
          <div class="flex gap-2 items-center">
            <button class="btn btn-outline btn-sm" id="prevDay">‹</button>
            <input type="date" id="tableDate">
            <button class="btn btn-outline btn-sm" id="nextDay">›</button>
          </div>
        </div>
        <p class="text-mid small">Prenotazioni del giorno selezionato, raggruppate per tavolo. Le prenotazioni senza tavolo assegnato sono mostrate separatamente.</p>
      </div>

      <div class="grid grid-3 mb-3" id="tablesGrid"></div>

      <div class="card">
        <div class="card-header"><h2>Senza tavolo assegnato</h2></div>
        <div id="unassignedList"></div>
      </div>

    </main>
  </div>
</div>

<script src="assets/js/db.js"></script>
<script src="assets/js/layout.js"></script>
<script src="assets/js/tavoli.js"></script>
<script type="module" src="assets/js/feedback-widget.js"></script>
</body>
</html>
