<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accedi · Reservo</title>
<link rel="icon" href="assets/img/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
<script src="assets/js/auth.js"></script>
<script>if (isLoggedIn()) location.href = 'index.html';</script>
</head>
<body class="login-page">

  <div class="login-card">
    <div class="login-logo">
      <img src="assets/img/logo.png" alt="Reservo">
      <span>Reservo</span>
    </div>
    <h1>Accedi al gestionale</h1>
    <p class="text-mid small mb-3">Inserisci le tue credenziali per continuare.</p>

    <form id="loginForm">
      <div class="field">
        <label>Email</label>
        <input type="email" id="loginEmail" autocomplete="email" required>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="loginPassword" autocomplete="current-password" required>
      </div>
      <div id="loginError" class="login-error">Email o password non corretti.</div>
      <button type="submit" class="btn btn-primary w-full">Accedi</button>
    </form>

    <div class="login-hint">
      <strong>Demo:</strong> info@damario.it / demo123
    </div>
  </div>

<script>
document.getElementById('loginForm').addEventListener('submit', function (e) {
  e.preventDefault();
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;
  if (login(email, password)) {
    location.href = 'index.html';
  } else {
    document.getElementById('loginError').classList.add('show');
  }
});
</script>
</body>
</html>
