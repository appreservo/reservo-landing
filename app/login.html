<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accedi · Reservo</title>
<link rel="icon" href="assets/img/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="login-page">

  <div class="login-card">
    <div class="login-logo">
      <img src="assets/img/logo.png" alt="Reservo">
      <span>Reservo</span>
    </div>
    <h1>Accedi al gestionale</h1>
    <p class="text-mid small mb-3">Inserisci le tue credenziali per continuare.</p>

    <form id="loginForm">
      <div class="field">
        <label>Email</label>
        <input type="email" id="loginEmail" autocomplete="email" required>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="loginPassword" autocomplete="current-password" required>
      </div>
      <div id="loginError" class="login-error"></div>
      <button type="submit" class="btn btn-primary w-full" id="loginSubmit">Accedi</button>
      <p class="login-forgot">
        <a href="#" id="forgotLink">Password dimenticata?</a>
      </p>
    </form>

    <form id="resetForm" class="hidden">
      <p class="text-mid small mb-3">Inserisci la tua email: ti invieremo un link per reimpostare la password.</p>
      <div class="field">
        <label>Email</label>
        <input type="email" id="resetEmail" autocomplete="email" required>
      </div>
      <div id="resetError" class="login-error"></div>
      <div id="resetSuccess" class="login-success"></div>
      <button type="submit" class="btn btn-primary w-full" id="resetSubmit">Invia link di recupero</button>
      <p class="login-forgot">
        <a href="#" id="backToLoginLink">Torna al login</a>
      </p>
    </form>
  </div>

<script type="module">
  import { auth, login, resetPassword } from './assets/js/auth.js';
  import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";

  onAuthStateChanged(auth, (user) => {
    if (user) location.href = 'index.html';
  });

  const errorMessages = {
    'auth/invalid-email': 'Email non valida.',
    'auth/user-disabled': 'Account disabilitato.',
    'auth/user-not-found': 'Email o password non corretti.',
    'auth/wrong-password': 'Email o password non corretti.',
    'auth/invalid-credential': 'Email o password non corretti.',
    'auth/too-many-requests': 'Troppi tentativi. Riprova tra qualche minuto.',
  };

  const form = document.getElementById('loginForm');
  const errorEl = document.getElementById('loginError');
  const submitBtn = document.getElementById('loginSubmit');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;

    errorEl.classList.remove('show');
    submitBtn.disabled = true;
    submitBtn.textContent = 'Accesso in corso…';

    try {
      await login(email, password);
      location.href = 'index.html';
    } catch (err) {
      errorEl.textContent = errorMessages[err.code] || 'Accesso non riuscito. Riprova.';
      errorEl.classList.add('show');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Accedi';
    }
  });

  // --- Recupero password ---
  const resetForm = document.getElementById('resetForm');
  const resetError = document.getElementById('resetError');
  const resetSuccess = document.getElementById('resetSuccess');
  const resetSubmit = document.getElementById('resetSubmit');
  const forgotLink = document.getElementById('forgotLink');
  const backToLoginLink = document.getElementById('backToLoginLink');

  forgotLink.addEventListener('click', (e) => {
    e.preventDefault();
    form.classList.add('hidden');
    resetForm.classList.remove('hidden');
  });

  backToLoginLink.addEventListener('click', (e) => {
    e.preventDefault();
    resetForm.classList.add('hidden');
    form.classList.remove('hidden');
    resetError.classList.remove('show');
    resetSuccess.classList.remove('show');
  });

  resetForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('resetEmail').value;

    resetError.classList.remove('show');
    resetSuccess.classList.remove('show');
    resetSubmit.disabled = true;
    resetSubmit.textContent = 'Invio in corso…';

    try {
      await resetPassword(email);
      resetSuccess.textContent = 'Email inviata! Controlla la tua casella di posta per reimpostare la password.';
      resetSuccess.classList.add('show');
    } catch (err) {
      resetError.textContent = errorMessages[err.code] || 'Invio non riuscito. Riprova.';
      resetError.classList.add('show');
    } finally {
      resetSubmit.disabled = false;
      resetSubmit.textContent = 'Invia link di recupero';
    }
  });
</script>
<script type="module" src="assets/js/feedback-widget.js"></script>
</body>
</html>
